name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust
        run: rustup default stable

      - name: Cache Cargo data
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ github.workflow }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ github.workflow }}-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Smoke-test CLI commands
        run: |
          cargo run -p open-cloud-cli -- --help
          cargo run -p open-cloud-cli -- doctor
          cargo run -p open-cloud-cli -- capabilities --json

  msrv:
    name: Rust 1.88 MSRV
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install declared Rust toolchain
        run: rustup toolchain install 1.88.0 --profile minimal

      - name: Check workspace against MSRV
        run: cargo +1.88.0 check --workspace --all-targets --locked

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.0 --locked

      - name: Audit Rust dependencies
        run: cargo audit

  flutter:
    name: Flutter client
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: apps/client
        run: flutter pub get

      - name: Analyze Dart
        working-directory: apps/client
        run: dart analyze

      - name: Run Flutter tests
        working-directory: apps/client
        run: flutter test
