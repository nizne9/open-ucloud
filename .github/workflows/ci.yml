name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Rust
        run: rustup default stable

      - name: Cache Cargo data
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ github.workflow }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ github.workflow }}-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Smoke-test CLI commands
        run: |
          cargo run -p open-cloud-cli -- --help
          cargo run -p open-cloud-cli -- doctor
          cargo run -p open-cloud-cli -- capabilities --json

  flutter:
    name: Flutter client
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: apps/client
        run: flutter pub get

      - name: Analyze Dart
        working-directory: apps/client
        run: dart analyze

      - name: Run Flutter tests
        working-directory: apps/client
        run: flutter test
