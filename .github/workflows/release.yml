name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* tag to publish.
        required: false
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_ref: ${{ steps.release.outputs.release_ref }}

    steps:
      - name: Resolve release tag
        id: release
        run: |
          release_tag="${{ inputs.tag || github.ref_name }}"
          if [ -z "$release_tag" ] || [ "${release_tag#v}" = "$release_tag" ]; then
            echo "Release workflows publish only existing v* tags. Got: $release_tag" >&2
            exit 1
          fi
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_ref=refs/tags/$release_tag" >> "$GITHUB_OUTPUT"

  cli-linux:
    name: Release CLI Linux ${{ matrix.backend }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: keyutils
            artifact: open-cloud-cli-linux-x64-keyutils
            cargo_features: ""
          - backend: secret-service
            artifact: open-cloud-cli-linux-x64-secret-service
            cargo_features: "--features linux-secret-service"

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Set up Rust
        run: rustup default stable

      - name: Cache Cargo data
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ github.workflow }}-${{ matrix.backend }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ github.workflow }}-${{ matrix.backend }}-

      - name: Build CLI
        run: cargo build --release -p open-cloud-cli ${{ matrix.cargo_features }}

      - name: Package CLI
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/release/open-cloud dist/${{ matrix.artifact }}/open-cloud
          tar -C dist -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload release asset artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256
          retention-days: 14

  cli-windows:
    name: Release CLI Windows
    needs: prepare
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - name: Set up Rust
        run: rustup default stable

      - name: Cache Cargo data
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ github.workflow }}-cli-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ github.workflow }}-cli-

      - name: Build CLI
        run: cargo build --release -p open-cloud-cli

      - name: Package CLI
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/open-cloud-cli-windows-x64 | Out-Null
          Copy-Item target/release/open-cloud.exe dist/open-cloud-cli-windows-x64/open-cloud.exe
          Compress-Archive -Path dist/open-cloud-cli-windows-x64/* -DestinationPath open-cloud-cli-windows-x64.zip -Force
          $hash = (Get-FileHash open-cloud-cli-windows-x64.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  open-cloud-cli-windows-x64.zip" | Out-File -Encoding ascii open-cloud-cli-windows-x64.zip.sha256

      - name: Upload release asset artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-open-cloud-cli-windows-x64
          path: |
            open-cloud-cli-windows-x64.zip
            open-cloud-cli-windows-x64.zip.sha256
          retention-days: 14

  cli-macos:
    name: Release CLI macOS universal
    needs: prepare
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - name: Set up Rust
        run: |
          rustup default stable
          rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Cache Cargo data
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ github.workflow }}-cli-universal-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ github.workflow }}-cli-universal-

      - name: Build universal CLI
        run: |
          cargo build --release --target x86_64-apple-darwin -p open-cloud-cli
          cargo build --release --target aarch64-apple-darwin -p open-cloud-cli
          mkdir -p dist/open-cloud-cli-macos-universal
          lipo -create \
            target/x86_64-apple-darwin/release/open-cloud \
            target/aarch64-apple-darwin/release/open-cloud \
            -output dist/open-cloud-cli-macos-universal/open-cloud
          chmod +x dist/open-cloud-cli-macos-universal/open-cloud
          tar -C dist -czf open-cloud-cli-macos-universal.tar.gz open-cloud-cli-macos-universal
          shasum -a 256 open-cloud-cli-macos-universal.tar.gz > open-cloud-cli-macos-universal.tar.gz.sha256

      - name: Upload release asset artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-open-cloud-cli-macos-universal
          path: |
            open-cloud-cli-macos-universal.tar.gz
            open-cloud-cli-macos-universal.tar.gz.sha256
          retention-days: 14

  client-linux:
    name: Release Flutter Linux client
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev libsecret-1-dev ninja-build pkg-config

      - name: Set up Rust
        run: rustup default stable

      - name: Cache Cargo data
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ github.workflow }}-client-linux-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ github.workflow }}-client-linux-

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Build Rust FFI library
        run: cargo build --release -p open-cloud-ffi

      - name: Build Linux client
        working-directory: apps/client
        run: |
          flutter config --enable-linux-desktop
          flutter pub get
          flutter build linux --release

      - name: Package Linux client
        run: |
          test -f apps/client/build/linux/x64/release/bundle/lib/libopen_cloud_ffi.so
          tar -C apps/client/build/linux/x64/release \
            -czf open-ucloud-client-linux-x64-unsigned.tar.gz bundle
          sha256sum open-ucloud-client-linux-x64-unsigned.tar.gz > open-ucloud-client-linux-x64-unsigned.tar.gz.sha256

      - name: Upload release asset artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-open-ucloud-client-linux-x64-unsigned
          path: |
            open-ucloud-client-linux-x64-unsigned.tar.gz
            open-ucloud-client-linux-x64-unsigned.tar.gz.sha256
          retention-days: 14

  client-windows:
    name: Release Flutter Windows client
    needs: prepare
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - name: Set up Rust
        run: rustup default stable

      - name: Cache Cargo data
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ github.workflow }}-client-windows-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ github.workflow }}-client-windows-

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Build Rust FFI library
        run: cargo build --release -p open-cloud-ffi

      - name: Build Windows client
        working-directory: apps/client
        run: |
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release

      - name: Package Windows client
        shell: pwsh
        run: |
          $bundle = "apps/client/build/windows/x64/runner/Release"
          if (!(Test-Path "$bundle/open_cloud_ffi.dll")) {
            throw "Missing $bundle/open_cloud_ffi.dll"
          }
          Compress-Archive -Path "$bundle/*" -DestinationPath open-ucloud-client-windows-x64-unsigned.zip -Force
          $hash = (Get-FileHash open-ucloud-client-windows-x64-unsigned.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  open-ucloud-client-windows-x64-unsigned.zip" | Out-File -Encoding ascii open-ucloud-client-windows-x64-unsigned.zip.sha256

      - name: Upload release asset artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-open-ucloud-client-windows-x64-unsigned
          path: |
            open-ucloud-client-windows-x64-unsigned.zip
            open-ucloud-client-windows-x64-unsigned.zip.sha256
          retention-days: 14

  client-macos:
    name: Release Flutter macOS client
    needs: prepare
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - name: Set up Rust
        run: |
          rustup default stable
          rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Cache Cargo data
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ github.workflow }}-client-macos-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ github.workflow }}-client-macos-

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Build macOS client
        working-directory: apps/client
        run: |
          flutter config --enable-macos-desktop
          flutter pub get
          flutter build macos --release

      - name: Package macOS client
        run: |
          test -f apps/client/build/macos/Build/Products/Release/open_cloud_client.app/Contents/Frameworks/libopen_cloud_ffi.dylib
          ditto -c -k --sequesterRsrc --keepParent \
            apps/client/build/macos/Build/Products/Release/open_cloud_client.app \
            open-ucloud-client-macos-universal-unsigned.zip
          shasum -a 256 open-ucloud-client-macos-universal-unsigned.zip > open-ucloud-client-macos-universal-unsigned.zip.sha256

      - name: Upload release asset artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-open-ucloud-client-macos-universal-unsigned
          path: |
            open-ucloud-client-macos-universal-unsigned.zip
            open-ucloud-client-macos-universal-unsigned.zip.sha256
          retention-days: 14

  client-android:
    name: Release Flutter Android APKs
    needs: prepare
    runs-on: ubuntu-latest
    environment: android-release

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Rust
        run: |
          rustup default stable
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

      - name: Cache Cargo data
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ github.workflow }}-client-android-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ github.workflow }}-client-android-

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Decode Android release keystore
        env:
          ANDROID_RELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
        run: |
          test -n "$ANDROID_RELEASE_KEYSTORE_B64"
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_B64" > open-ucloud-release.p12.b64
          base64 -d open-ucloud-release.p12.b64 > apps/client/android/app/open-ucloud-release.p12
          rm -f open-ucloud-release.p12.b64

      - name: Build Android release APKs
        working-directory: apps/client
        env:
          ANDROID_RELEASE_STORE_FILE: ${{ github.workspace }}/apps/client/android/app/open-ucloud-release.p12
          ANDROID_RELEASE_STORE_TYPE: pkcs12
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          flutter pub get
          flutter build apk --release --split-per-abi

      - name: Verify Android APKs
        run: |
          apksigner="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -x "$apksigner"
          for abi in arm64-v8a armeabi-v7a x86_64; do
            apk="apps/client/build/app/outputs/flutter-apk/app-${abi}-release.apk"
            test -f "$apk"
            unzip -l "$apk" | grep "lib/${abi}/libopen_cloud_ffi.so"
            "$apksigner" verify --verbose --print-certs "$apk"
          done

      - name: Package Android APKs
        run: |
          for abi in arm64-v8a armeabi-v7a x86_64; do
            src="apps/client/build/app/outputs/flutter-apk/app-${abi}-release.apk"
            dest="open-ucloud-client-android-${abi}.apk"
            cp "$src" "$dest"
            sha256sum "$dest" > "$dest.sha256"
          done

      - name: Upload Android release asset artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-open-ucloud-client-android
          path: |
            open-ucloud-client-android-*.apk
            open-ucloud-client-android-*.apk.sha256
          retention-days: 14

  upload-release:
    name: Upload GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - cli-linux
      - cli-windows
      - cli-macos
      - client-linux
      - client-windows
      - client-macos
      - client-android
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}

    steps:
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Verify checksums
        working-directory: release-assets
        run: |
          for checksum in *.sha256; do
            sha256sum -c "$checksum"
          done

      - name: Create or update release
        run: |
          notes="Android APKs are release-signed. Desktop client packages are unsigned until platform signing and notarization are configured."
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --verify-tag \
              --title "$RELEASE_TAG" \
              --notes "$notes"
          fi
